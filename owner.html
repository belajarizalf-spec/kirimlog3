<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>KirimLog Owner</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --blue:#2563EB;--blue-l:#EFF6FF;--blue-m:#DBEAFE;
  --green:#16A34A;--green-l:#F0FDF4;--green-m:#DCFCE7;
  --red:#DC2626;--red-l:#FEF2F2;--red-m:#FEE2E2;
  --amber:#D97706;--amber-l:#FFFBEB;--amber-m:#FDE68A;
  --violet:#7C3AED;--violet-l:#F5F3FF;--violet-m:#EDE9FE;
  --text:#111827;--t2:#6B7280;--t3:#9CA3AF;
  --border:#E8EAED;--bg:#F5F6F8;--w:#FFFFFF;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{font-family:'Plus Jakarta Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;min-height:100%}
.topbar{background:var(--w);border-bottom:1px solid var(--border);height:56px;padding:0 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.logo{display:flex;align-items:center;gap:8px}
.logo-ico{width:30px;height:30px;border-radius:8px;background:var(--blue);display:flex;align-items:center;justify-content:center;font-size:15px}
.logo-txt{font-size:17px;font-weight:800;letter-spacing:-.3px}
.badge{background:var(--violet-l);color:var(--violet);font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;border:1px solid var(--violet-m)}
.btn-refresh{padding:7px 13px;background:var(--blue);color:#fff;border:none;border-radius:8px;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer}
.content{padding:16px;max-width:640px;margin:0 auto;padding-bottom:48px}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:12px}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite}
.loading-msg{font-size:13px;color:var(--t2);font-weight:500}
@keyframes spin{to{transform:rotate(360deg)}}
.err-box{background:var(--red-l);border:1px solid var(--red-m);border-radius:10px;padding:14px 16px;font-size:13px;color:var(--red);line-height:1.6;margin-bottom:12px}
.sec{font-size:11px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--t3);margin:20px 0 10px}
.last-upd{font-size:11px;color:var(--t3);text-align:right;margin-bottom:14px}
.kpi4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.kpi2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.kpi{background:var(--w);border:1px solid var(--border);border-radius:12px;padding:12px 8px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.kpi-n{font-size:26px;font-weight:800;line-height:1;margin-bottom:3px}
.kpi-n.sm{font-size:20px}
.kpi-l{font-size:9px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.4px}
.chart-wrap{background:var(--w);border:1px solid var(--border);border-radius:12px;padding:14px;box-shadow:0 1px 3px rgba(0,0,0,.05);overflow:hidden}
.chart-bars{display:-webkit-flex;display:flex;-webkit-align-items:flex-end;align-items:flex-end;gap:2px;height:72px;margin-bottom:4px}
.bar-col{display:-webkit-flex;display:flex;-webkit-flex-direction:column;flex-direction:column;-webkit-align-items:center;align-items:center;-webkit-flex:1;flex:1;gap:1px}
.bar-seg{width:100%;border-radius:2px 2px 0 0;min-height:2px}
.bar-lbl{font-size:7px;color:var(--t3);text-align:center}
.dtable{background:var(--w);border:1px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.drow{display:grid;grid-template-columns:1fr 44px 44px 44px;border-bottom:1px solid var(--border)}
.drow:last-child{border:none}
.drow.hdr{background:#1A1A18}
.drow.hdr>div{padding:7px 8px;font-size:10px;font-weight:700;color:#E8D5A3;text-align:center}
.drow.hdr>div:first-child{text-align:left;padding-left:12px}
.drow>div{padding:8px 8px;font-size:12px;text-align:center;display:flex;align-items:center;justify-content:center}
.drow>div:first-child{justify-content:flex-start;padding-left:12px;font-weight:600}
.drow.today{background:var(--blue-l)}
.drow.today>div{color:var(--blue);font-weight:700}
.drow.empty-r>div{color:var(--t3)}
.tabs{display:-webkit-flex;display:flex;gap:6px;margin-bottom:10px;-webkit-flex-wrap:wrap;flex-wrap:wrap}
.tab{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;border:1.5px solid var(--border);background:var(--w);color:var(--t2);white-space:nowrap}
.tab.on{background:var(--blue);color:#fff;border-color:var(--blue)}
.top-list{background:var(--w);border:1px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.top-hdr{padding:8px 14px;font-size:10px;font-weight:700;color:var(--t3);letter-spacing:.5px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between}
.top-item{display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border)}
.top-item:last-child{border:none}
.rank{width:22px;height:22px;border-radius:6px;display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;-webkit-justify-content:center;justify-content:center;font-size:10px;font-weight:800;flex-shrink:0}
.r1{background:var(--blue-m);color:var(--blue)}.r2{background:#FEF9C3;color:#A16207}
.r3{background:var(--green-m);color:var(--green)}.rn{background:var(--bg);color:var(--t3)}
.top-info{flex:1;min-width:0}
.top-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.top-sub{font-size:9px;color:var(--t3);margin-top:1px}
.bar-wrap{width:60px;height:5px;background:var(--bg);border-radius:3px;overflow:hidden;flex-shrink:0}
.bar-fill{height:100%;border-radius:3px}
.top-qty{font-size:12px;font-weight:700;color:var(--blue);background:var(--blue-l);border-radius:6px;padding:2px 8px;white-space:nowrap;flex-shrink:0}
.empty-state{padding:24px;text-align:center;color:var(--t3);font-size:13px}
.atable{background:var(--w);border:1px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.arow{display:grid;grid-template-columns:1fr 50px 50px 60px;border-bottom:1px solid var(--border)}
.arow:last-child{border:none}
.arow.hdr{background:#1A1A18}
.arow.hdr>div{padding:7px 8px;font-size:10px;font-weight:700;color:#E8D5A3;text-align:center}
.arow.hdr>div:first-child{text-align:left;padding-left:14px}
.arow>div{padding:9px 8px;font-size:12px;text-align:center;display:flex;align-items:center;justify-content:center}
.arow>div:first-child{justify-content:flex-start;padding-left:14px;font-weight:700}
.jam-wrap{display:-webkit-flex;display:flex;gap:2px;-webkit-align-items:flex-end;align-items:flex-end;height:56px;margin-bottom:4px}
.jam-bar{-webkit-flex:1;flex:1;border-radius:2px 2px 0 0;min-height:2px;background:var(--blue-m)}
.jam-lbl-row{display:-webkit-flex;display:flex;gap:2px}
.jam-lbl-item{-webkit-flex:1;flex:1;font-size:7px;color:var(--t3);text-align:center}
.kc{background:var(--w);border:1px solid var(--border);border-left:3px solid var(--red);border-radius:10px;padding:12px 14px;margin-bottom:8px}
.kc-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:5px}
.kc-order{font-size:10px;color:var(--red);font-weight:700;letter-spacing:.5px;margin-bottom:2px}
.kc-prod{font-weight:700;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px}
.kc-date{font-size:10px;color:var(--t3);text-align:right;flex-shrink:0}
.kc-item{font-size:12px;color:var(--t2);padding:4px 0;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px}
.kc-item:last-child{border:none}
.pill{display:inline-flex;align-items:center;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:700;white-space:nowrap}
.p-menyusul{background:var(--blue-m);color:var(--blue)}
.p-refund{background:var(--amber-m);color:var(--amber)}
.p-pending{background:var(--bg);color:var(--t3);border:1px solid var(--border)}
.aging-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}
</style>
</head>
<body>
<div class="topbar">
  <div class="logo">
    <div class="logo-ico">📦</div>
    <div class="logo-txt">KirimLog</div>
    <div class="badge">Owner</div>
  </div>
  <button class="btn-refresh" id="btnRefresh" onclick="loadData()">↻ Refresh</button>
</div>
<div class="content" id="content">
  <div class="loading">
    <div class="spinner"></div>
    <div class="loading-msg" id="loadMsg">Menghitung data di server...</div>
  </div>
</div>

<script>
var GAS_EXEC_URL = localStorage.getItem('kirimlog_owner_url') || '';
var _d = null; // dashboard summary data
var _period = 'week';
var _timer = null;

var MON = ['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];
var DAYS = ['Min','Sen','Sel','Rab','Kam','Jum','Sab'];

window.onload = function(){
  // Ambil URL dari query param ?gasUrl=... atau localStorage
  var params = new URLSearchParams(window.location.search);
  var urlParam = params.get('gasUrl');
  if(urlParam){ GAS_EXEC_URL=urlParam; localStorage.setItem('kirimlog_owner_url',urlParam); }
  loadData();
};

function loadData(){
  var btn=document.getElementById('btnRefresh');
  if(btn) btn.textContent='⟳...';
  set('content','<div class="loading"><div class="spinner"></div><div class="loading-msg">Menghitung data di server...<br><small style="color:var(--t3);font-size:11px">Biasanya 3–8 detik</small></div></div>');
  if(_timer) clearTimeout(_timer);

  // Netlify: JSONP untuk ambil summary dari GAS
  if(!GAS_EXEC_URL){ showErr('Setup URL Apps Script dulu — tambahkan ?gasUrl=URL_ANDA di address bar atau hubungi admin.'); return; }
  var old=document.getElementById('_dsJs'); if(old) old.remove();
  var cbName='_dsCb'+Date.now();
  window[cbName]=function(data){
    clearTimeout(_timer);
    if(btn) btn.textContent='↻ Refresh';
    delete window[cbName];
    var el=document.getElementById('_dsJs'); if(el) el.remove();
    if(!data||!data.ok){ showErr('Error: '+(data&&data.error?data.error:'Tidak diketahui')); return; }
    _d=data; render();
  };
  var s=document.createElement('script'); s.id='_dsJs';
  s.src=GAS_EXEC_URL+'?action=getDashboard&callback='+cbName+'&t='+Date.now();
  s.onerror=function(){
    if(btn) btn.textContent='↻ Refresh';
    showErr('Gagal memuat. Pastikan URL Apps Script benar.');
  };
  document.head.appendChild(s);

  _timer = setTimeout(function(){
    if(document.querySelector('.spinner')){
      if(btn) btn.textContent='↻ Refresh';
      showErr('Timeout (30 detik). Coba Refresh.');
    }
  }, 30000);
}

function set(id,html){var e=document.getElementById(id);if(e)e.innerHTML=html;}
function pad(n){return String(n).padStart(2,'0');}
function showErr(m){
  set('content','<div class="err-box">❌ '+m+'</div>'+
    '<button onclick="loadData()" style="padding:9px 16px;background:var(--w);border:1.5px solid var(--border);border-radius:8px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;color:var(--t2)">↻ Coba lagi</button>');
}
function nowStr(){
  var n=new Date();
  return pad(n.getDate())+'/'+pad(n.getMonth()+1)+'/'+n.getFullYear()+' '+pad(n.getHours())+':'+pad(n.getMinutes());
}
function todayKey(){
  var n=new Date();
  return n.getFullYear()+'-'+pad(n.getMonth()+1)+'-'+pad(n.getDate());
}
function fmtDay(dk){
  var d=new Date(dk+'T00:00:00');
  return DAYS[d.getDay()]+' '+d.getDate()+' '+MON[d.getMonth()];
}
function daysBetween(dateStr){
  var d=new Date(dateStr+'T00:00:00');
  var now=new Date(); var t=new Date(now.getFullYear(),now.getMonth(),now.getDate());
  return Math.floor((t-d)/(1000*60*60*24));
}

function renderTopList(list, colorFn){
  if(!list||!list.length) return '<div class="top-list"><div class="empty-state">Belum ada data</div></div>';
  var max=list[0].qty;
  var total=list.reduce(function(s,p){return s+p.qty;},0);
  var h='<div class="top-list"><div class="top-hdr"><span>'+list.length+' PRODUK</span><span>TOTAL: '+total+' PCS</span></div>';
  list.forEach(function(p,i){
    var rc=i===0?'r1':i===1?'r2':i===2?'r3':'rn';
    var pct=Math.round(p.qty/max*100);
    var share=Math.round(p.qty/total*100);
    var bc=colorFn?colorFn(i):(i===0?'var(--blue)':i<3?'var(--green)':'var(--border)');
    h+='<div class="top-item">';
    h+='<div class="rank '+rc+'">'+(i+1)+'</div>';
    h+='<div class="top-info"><div class="top-name">'+p.name+'</div><div class="top-sub">'+share+'% dari periode</div></div>';
    h+='<div class="bar-wrap"><div class="bar-fill" style="width:'+pct+'%;background:'+bc+'"></div></div>';
    h+='<div class="top-qty">'+p.qty+' pcs</div>';
    h+='</div>';
  });
  return h+'</div>';
}

function switchPeriod(p,el){
  _period=p;
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('on');});
  if(el) el.classList.add('on');
  var list = p==='week'?_d.topWeek : p==='month'?_d.topMonth : _d.topAll;
  set('topList', renderTopList(list));
}

function render(){
  var d=_d;
  var tk=todayKey();
  var kpi=d.kpi||{total:0,lengkap:0,kurang:0,pcs:0};
  var kpit=d.kpiToday||{total:0,lengkap:0,kurang:0,pcs:0};
  var pct=kpi.total>0?Math.round(kpi.lengkap/kpi.total*100):0;
  var pctC=pct>=90?'var(--green)':pct>=70?'var(--amber)':'var(--red)';
  var daily=d.daily||[];
  var admins=d.adminPerf||[];
  var jams=d.jamStats||[];
  var bkTop=d.barangKurang||[];
  var kurang=d.kurangList||[];
  var unresolved=kurang.filter(function(r){return String(r.resolusi||'').includes('Belum');});

  var h='';
  h+='<div class="last-upd">↻ '+nowStr()+' · '+kpi.total+' total data</div>';

  // KPI HARI INI
  h+='<div class="sec">📅 Hari Ini</div>';
  h+='<div class="kpi4">';
  h+=kpiBox(kpit.total,'Total','var(--blue)',true);
  h+=kpiBox(kpit.lengkap,'Lengkap','var(--green)',true);
  h+=kpiBox(kpit.kurang,'Kurang','var(--red)',true);
  h+=kpiBox(kpit.pcs,'Pcs','var(--amber)',true);
  h+='</div>';

  // KPI KESELURUHAN
  h+='<div class="sec">📊 Keseluruhan</div>';
  h+='<div class="kpi2">';
  h+=kpiBox(kpi.total,'Total Kirim','var(--blue)',false);
  h+=kpiBox(kpi.lengkap,'Lengkap','var(--green)',false);
  h+=kpiBox(kpi.kurang,'Tidak Lengkap','var(--red)',false);
  h+=kpiBox(pct+'%','% Lengkap',pctC,false);
  h+='</div>';

  // TREN 30 HARI
  h+='<div class="sec">📈 Tren 30 Hari Terakhir</div>';
  h+='<div class="chart-wrap">';
  var maxT=Math.max.apply(null,daily.map(function(d){return(d.ok||0)+(d.kurang||0);}));
  if(maxT<1) maxT=1;
  h+='<div class="chart-bars">';
  daily.forEach(function(d){
    var tot=(d.ok||0)+(d.kurang||0);
    var hOk=Math.round((d.ok||0)/maxT*68);
    var hKur=Math.round((d.kurang||0)/maxT*68);
    var isT=d.tanggal===tk;
    h+='<div class="bar-col">';
    if(d.kurang>0) h+='<div class="bar-seg" style="height:'+hKur+'px;background:'+(isT?'#DC2626':'#FEE2E2')+'"></div>';
    if(d.ok>0)     h+='<div class="bar-seg" style="height:'+hOk+'px;background:'+(isT?'#2563EB':'#DBEAFE')+'"></div>';
    if(tot===0)    h+='<div class="bar-seg" style="height:2px;background:#E8EAED"></div>';
    h+='</div>';
  });
  h+='</div>';
  h+='<div style="display:flex;gap:2px">';
  daily.forEach(function(d,i){
    var lbl=(i===0||i===6||i===13||i===20||i===29)?d.tanggal.substring(8):' ';
    h+='<div style="flex:1;font-size:7px;color:var(--t3);text-align:center">'+lbl+'</div>';
  });
  h+='</div>';
  h+='<div style="display:flex;gap:12px;font-size:10px;color:var(--t2);font-weight:600;margin-top:8px">';
  h+='<span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:#DBEAFE;margin-right:4px"></span>Lengkap</span>';
  h+='<span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:#FEE2E2;margin-right:4px"></span>Kurang</span>';
  h+='</div></div>';

  // 7 HARI
  h+='<div class="sec">📆 7 Hari Terakhir</div>';
  h+='<div class="dtable"><div class="drow hdr"><div>Tanggal</div><div>Total</div><div>OK</div><div>Pcs</div></div>';
  daily.slice(-7).forEach(function(d){
    var isT=d.tanggal===tk, tot=(d.ok||0)+(d.kurang||0);
    h+='<div class="drow'+(isT?' today':tot===0?' empty-r':'')+'">';
    h+='<div>'+(isT?'⭐ ':'')+fmtDay(d.tanggal)+'</div>';
    h+='<div>'+(tot||'–')+'</div>';
    h+='<div style="color:'+(d.ok>0?'var(--green)':'var(--t3)')+'">'+((d.ok)||'–')+'</div>';
    h+='<div>'+((d.pcs)||'–')+'</div>';
    h+='</div>';
  });
  h+='</div>';

  // ADMIN PERFORMANCE
  h+='<div class="sec">👤 Admin Performance</div>';
  if(!admins.length){
    h+='<div class="atable"><div class="empty-state">Belum ada data</div></div>';
  } else {
    h+='<div class="atable"><div class="arow hdr"><div>Admin</div><div>Total</div><div>Kurang</div><div>% OK</div></div>';
    admins.forEach(function(a,i){
      var pA=a.total>0?Math.round(a.ok/a.total*100):0;
      var pc=pA>=90?'var(--green)':pA>=70?'var(--amber)':'var(--red)';
      var bg=i%2===0?'var(--w)':'var(--bg)';
      h+='<div class="arow" style="background:'+bg+'">';
      h+='<div>'+a.name+'</div>';
      h+='<div style="font-weight:700">'+a.total+'</div>';
      h+='<div style="color:var(--red);font-weight:600">'+a.kurang+'</div>';
      h+='<div style="color:'+pc+';font-weight:800">'+pA+'%</div>';
      h+='</div>';
    });
    h+='</div>';
  }

  // JAM TERSIBUK
  h+='<div class="sec">🕐 Jam Tersibuk</div>';
  h+='<div class="chart-wrap">';
  var showJ=jams.slice(6,23), maxJ=Math.max.apply(null,showJ)||1;
  var peakH=6+showJ.indexOf(Math.max.apply(null,showJ));
  h+='<div class="jam-wrap">';
  showJ.forEach(function(cnt,i){
    var hr=i+6, barH=Math.round((cnt/maxJ)*52), isPeak=hr===peakH&&cnt>0;
    h+='<div class="jam-bar" style="height:'+Math.max(barH,cnt>0?2:1)+'px;background:'+(isPeak?'var(--blue)':cnt>0?'var(--blue-m)':'var(--border)')+'"></div>';
  });
  h+='</div><div class="jam-lbl-row">';
  showJ.forEach(function(cnt,i){
    var hr=i+6;
    h+='<div class="jam-lbl-item">'+(hr%3===0?hr:'')+'</div>';
  });
  h+='</div>';
  if(jams[peakH]>0) h+='<div style="font-size:12px;color:var(--t2);font-weight:600;margin-top:8px;text-align:center">⚡ Tersibuk jam <strong style="color:var(--blue)">'+(peakH<10?'0':'')+peakH+':00</strong> · '+jams[peakH]+' pengiriman</div>';
  h+='</div>';

  // TOP 30 PRODUK
  h+='<div class="sec">🔥 Top 30 Produk Terlaris</div>';
  h+='<div class="tabs">';
  h+='<div class="tab'+(_period==='week'?' on':'')+'" onclick="switchPeriod(\'week\',this)">Minggu Ini</div>';
  h+='<div class="tab'+(_period==='month'?' on':'')+'" onclick="switchPeriod(\'month\',this)">Bulan Ini</div>';
  h+='<div class="tab'+(_period==='all'?' on':'')+'" onclick="switchPeriod(\'all\',this)">90 Hari</div>';
  h+='</div>';
  var topList=_period==='week'?d.topWeek:_period==='month'?d.topMonth:d.topAll;
  h+='<div id="topList">'+renderTopList(topList)+'</div>';

  // BARANG KURANG TERBANYAK
  h+='<div class="sec">📦 Barang Paling Sering Kurang</div>';
  if(!bkTop.length){
    h+='<div class="top-list"><div class="empty-state">🎉 Tidak ada barang kurang!</div></div>';
  } else {
    var maxBK=bkTop[0].qty;
    h+='<div class="top-list"><div class="top-hdr"><span>'+bkTop.length+' ITEM</span><span>TOTAL KURANG</span></div>';
    bkTop.forEach(function(p,i){
      var rc=i===0?'r1':i===1?'r2':i===2?'r3':'rn';
      var pct=Math.round(p.qty/maxBK*100);
      h+='<div class="top-item"><div class="rank '+rc+'">'+(i+1)+'</div>';
      h+='<div class="top-info"><div class="top-name">'+p.name+'</div></div>';
      h+='<div class="bar-wrap"><div class="bar-fill" style="width:'+pct+'%;background:var(--red)"></div></div>';
      h+='<div class="top-qty" style="background:var(--red-l);color:var(--red)">'+p.qty+' kur</div></div>';
    });
    h+='</div>';
  }

  // PESANAN KURANG AGING
  h+='<div class="sec" style="color:var(--red)">⏱ Pesanan Kurang Menurut Usia</div>';
  if(!kurang.length){
    h+='<div class="top-list"><div class="empty-state">🎉 Semua pesanan lengkap!</div></div>';
  } else {
    var age0=kurang.filter(function(r){return daysBetween(r.tanggal)<3;}).length;
    var age3=kurang.filter(function(r){var d=daysBetween(r.tanggal);return d>=3&&d<7;}).length;
    var age7=kurang.filter(function(r){return daysBetween(r.tanggal)>=7;}).length;
    h+='<div class="aging-grid">';
    h+=agingKpi(age0,'< 3 hari','var(--green)');
    h+=agingKpi(age3,'3–7 hari','var(--amber)');
    h+=agingKpi(age7,'> 7 hari 🚨','var(--red)');
    h+='</div>';
    kurang.sort(function(a,b){return daysBetween(b.tanggal)-daysBetween(a.tanggal);});
    kurang.slice(0,20).forEach(function(r){ h+=kurangCard(r); });
    if(kurang.length>20) h+='<div style="font-size:12px;color:var(--t3);text-align:center;padding:8px">...dan '+(kurang.length-20)+' lainnya</div>';
  }

  // PERLU TINDAKAN
  if(unresolved.length>0){
    h+='<div class="sec" style="color:var(--red)">⚠ Perlu Tindakan ('+unresolved.length+')</div>';
    unresolved.slice(0,10).forEach(function(r){h+=kurangCard(r);});
  }

  h+='<div style="height:32px"></div>';
  set('content',h);
}

function kpiBox(n,label,color,sm){
  return '<div class="kpi"><div class="kpi-n'+(sm?' sm':'')+'" style="color:'+color+'">'+n+'</div><div class="kpi-l">'+label+'</div></div>';
}
function agingKpi(n,label,color){
  return '<div class="kpi"><div class="kpi-n sm" style="color:'+color+'">'+n+'</div><div class="kpi-l">'+label+'</div></div>';
}
function kurangCard(r){
  var days=daysBetween(r.tanggal);
  var ageC=days>=7?'var(--red)':days>=3?'var(--amber)':'var(--t3)';
  var prod=String(r.produk||'').split(' | ').map(function(p){return p.replace(/\s*\(\d+\s*pcs?\)/,'').trim();}).join(', ');
  var items=String(r.barangKurang||'').split(' | ');
  var resArr=String(r.resolusi||'').split(' | ');
  var h='<div class="kc"><div class="kc-top"><div><div class="kc-order">NO. '+r.noOrderan+'</div><div class="kc-prod">'+prod+'</div></div>';
  h+='<div class="kc-date">'+r.tanggal+'<br>'+r.jam+'<br>'+(r.admin||'');
  h+='<br><span style="font-weight:800;color:'+ageC+'">'+days+' hari</span></div></div>';
  items.forEach(function(item,i){
    var res=String(resArr[i]||'').trim();
    var isMenyusul=res.includes('Menyusul'),isRefund=res.includes('Refund');
    var pillCls=isMenyusul?'p-menyusul':isRefund?'p-refund':'p-pending';
    var pillTxt=isMenyusul?'📦 Menyusul':isRefund?'💰 Refund':'⏳ Belum';
    var rm=res.match(/\(([^)]+)\)/);
    h+='<div class="kc-item"><span style="flex:1">'+item.trim()+'</span>';
    h+='<span class="pill '+pillCls+'">'+pillTxt+'</span>';
    if(rm) h+='<span style="font-size:10px;color:var(--blue)">· '+rm[1]+'</span>';
    h+='</div>';
  });
  return h+'</div>';
}
</script>
</body>
</html>
